<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Component Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

  <header class="bg-white border-b border-gray-200 px-6 py-4">
    <h1 class="text-2xl font-bold tracking-tight">UI Component Library</h1>
    <p class="text-sm text-gray-500 mt-1">
      A showcase of reusable components built with HTML, Tailwind CSS & JavaScript
    </p>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-10 space-y-16">
    <!-- Components will be embedded here step by step -->
    <!-- Buttons -->
    <div id="section-buttons"></div>
  </main>

  <footer class="text-center text-sm text-gray-400 py-8">
    Built with Tailwind CSS · MIT License
  </footer>

  <!-- Component loader -->
  <script>
    // Lightweight include system — no build tools needed
    async function loadComponent(containerId, filePath) {
      try {
        const res = await fetch(filePath);
        if (!res.ok) throw new Error(`Failed to load ${filePath}`);
        const html = await res.text();
        document.getElementById(containerId).innerHTML = html;
      } catch (err) {
        console.error(err);
      }
    }

    loadComponent('section-buttons', 'components/buttons.html');
  </script>
</body>
</html>
